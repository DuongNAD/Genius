name: Genius CI/CD

# Per-OS branch scheme: `win` is optimized for Windows, `mac` for macOS,
# `main` is the shared trunk. Each branch runs on its own OS; main runs on
# both so an integration merge can't silently break either platform.
on:
  push:
    branches: [ main, master, win, mac ]
  pull_request:
    branches: [ main, master, win, mac ]

jobs:
  test-windows:
    if: github.ref_name != 'mac' && github.base_ref != 'mac'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest

  # OS-independent quality gates. Run once on Linux for every branch (no ref
  # gating) so a lint break, a broken dependency set, or a broken Dockerfile
  # fails fast regardless of which platform branch the change targets.
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 .

      - name: Dependency consistency (pip check)
        run: pip check

      - name: Vulnerability audit (pip-audit)
        # Advisory, not blocking: a newly-disclosed CVE in a transitive dep
        # would otherwise redden an unrelated PR. The finding still shows in the
        # job log; promote to a hard gate once the dependency set is triaged.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker smoke build
        # Validates the Dockerfile + .dockerignore + requirements install cleanly
        # into the image. The agent CLIs the providers need aren't in the image
        # by design, so no full pipeline runs here — the steps below exercise
        # the coordination surface (boot + auth) instead.
        run: docker build -t genius:ci .

      - name: Compose config validation
        # docker-compose.yml hard-fails (`:?`) when SKILL_API_KEY /
        # GENIUS_DASHBOARD_TOKEN are unset, so render it with both present:
        # a compose edit that breaks interpolation or drops the auth wiring
        # fails CI here instead of at the user's `docker compose up`.
        env:
          SKILL_API_KEY: ci-smoke-key
          GENIUS_DASHBOARD_TOKEN: ci-smoke-token
        run: docker compose config -q

      - name: Container auth smoke test
        # Boot one skill server from the built image and prove the auth path
        # end-to-end: /health answers, an unauthenticated /run is rejected,
        # and a /run signed with SKILL_API_KEY (JWT + HMAC body checksum, via
        # the repo's own helpers) is accepted. The background agent execution
        # fails later without vendor CLIs — request acceptance is the wiring
        # under test, i.e. exactly what a missing SKILL_API_KEY env used to
        # break silently.
        run: |
          docker run -d --name genius-smoke \
            -e SKILL_API_KEY=ci-smoke-key \
            -e GENIUS_SKILL_HOST=0.0.0.0 \
            -p 8005:8005 genius:ci python serve.py --roles security
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8005/health >/dev/null 2>&1; then break; fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8005/health
          echo
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' -d '{"prompt":"x"}' \
            http://127.0.0.1:8005/run)
          echo "unauthenticated /run -> HTTP $code"
          test "$code" = "400" -o "$code" = "401"
          # -i is REQUIRED: without it docker exec does not forward the heredoc
          # to the container's `python -` stdin, so the script runs empty, exits
          # 0, and the authenticated assertion below never executes — a silent
          # false positive (the CI log showed no "authenticated /run" line).
          docker exec -i genius-smoke python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          from ag_core.utils.jwt import encode_jwt
          from ag_core.utils.security import calculate_checksum

          key = os.environ["SKILL_API_KEY"]
          now = int(time.time())
          token = encode_jwt({"sub": "ci-smoke", "iat": now, "exp": now + 300}, key)
          body = json.dumps({"prompt": "/security_audit ping"}).encode("utf-8")
          req = urllib.request.Request(
              "http://127.0.0.1:8005/run",
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "X-API-Key": token,
                  "X-Payload-SHA256": calculate_checksum(body, key),
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=15) as resp:
              out = json.loads(resp.read().decode("utf-8"))
          print("authenticated /run ->", out)
          assert resp.status == 200 and out.get("task_id"), out
          PY
          docker rm -f genius-smoke

  test-macos:
    if: >-
      github.ref_name == 'mac' || github.ref_name == 'main' ||
      github.base_ref == 'mac' || github.base_ref == 'main'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest

  coverage:
    # Blocking coverage gate over production code (.coveragerc excludes test
    # files): fails the build when coverage drops below the threshold.
    # Baseline was ~83% when introduced; the threshold starts at 80% to
    # absorb platform variance — ratchet it UP as coverage improves, never
    # down. Runs on macOS (the platform the suite's timing-sensitive
    # distributed tests are tuned on) and as a SEPARATE job so the plain
    # `python -m pytest` contract of the test jobs stays untouched —
    # coverage instrumentation changes timings.
    if: >-
      github.ref_name == 'mac' || github.ref_name == 'main' ||
      github.base_ref == 'mac' || github.base_ref == 'main'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run pytest with coverage gate
        run: |
          python -m pytest --cov=. --cov-report=term --cov-fail-under=80
