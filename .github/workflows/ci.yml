name: Genius CI/CD

# Per-OS branch scheme: `win` is optimized for Windows, `mac` for macOS,
# `main` is the shared trunk. Each branch runs on its own OS; main runs on
# both so an integration merge can't silently break either platform.
on:
  push:
    branches: [ main, master, win, mac ]
  pull_request:
    branches: [ main, master, win, mac ]

jobs:
  test-windows:
    if: github.ref_name != 'mac' && github.base_ref != 'mac'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest

  test-macos:
    if: >-
      github.ref_name == 'mac' || github.ref_name == 'main' ||
      github.base_ref == 'mac' || github.base_ref == 'main'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest
