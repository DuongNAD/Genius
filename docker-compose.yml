version: '3.8'

services:
  hub:
    build: .
    command: python serve.py --distributed
    ports:
      - "8000:8000"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    volumes:
      - genius_data:/app

  dashboard:
    build: .
    command: python dashboard.py
    ports:
      - "8080:8080"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
      # The dashboard now binds loopback by default; inside a container it must
      # bind all interfaces for the 8080 port mapping to reach it. Set a token
      # to require auth: GENIUS_DASHBOARD_TOKEN=<secret>.
      - GENIUS_DASHBOARD_HOST=0.0.0.0
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  grok_researcher:
    build: .
    command: python serve.py --roles grok
    ports:
      - "8001:8001"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  claude_architect:
    build: .
    command: python serve.py --roles claude
    ports:
      - "8002:8002"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  codex_reviewer:
    build: .
    command: python serve.py --roles codex
    ports:
      - "8003:8003"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  tester_agent:
    build: .
    command: python serve.py --roles tester
    ports:
      - "8004:8004"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  security_agent:
    build: .
    command: python serve.py --roles security
    ports:
      - "8005:8005"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

  devops_agent:
    build: .
    command: python serve.py --roles devops
    ports:
      - "8006:8006"
    environment:
      - GENIUS_DB_PATH=/app/genius.db
    depends_on:
      - hub
    volumes:
      - genius_data:/app

volumes:
  genius_data:
