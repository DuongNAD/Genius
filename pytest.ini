[pytest]
norecursedirs = projects .agents
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
# Hang backstop (pytest-timeout): the slowest legitimate test is ~11s, so
# 300s only ever fires on a genuinely wedged test. On Windows the thread
# method dumps stacks then ends the run — still far better than a CI job
# that hangs until the runner's 6h kill.
timeout = 300
