[pytest]
# NOTE: setting norecursedirs REPLACES pytest's default (which includes .*),
# so dot-dirs must be excluded explicitly — .genius_jobs job workspaces hold
# pipeline-generated test modules under .genius/<slug>/tests/ that must never
# be collected into the repo's own suite.
norecursedirs = .* projects .agents
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
# Escalate leaked-async-task warnings to errors. When a coroutine (e.g. a
# ClientWorker.execute_task still running a dispatched task) outlives its test,
# the event loop destroys it on close and Python reports it via
# PytestUnraisableExceptionWarning. Gating it here means such a leak fails CI
# instead of hiding in the warning summary. Only this category is escalated;
# other deprecation warnings stay warnings.
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
# Hang backstop (pytest-timeout): the slowest legitimate test is ~11s, so
# 300s only ever fires on a genuinely wedged test. On Windows the thread
# method dumps stacks then ends the run — still far better than a CI job
# that hangs until the runner's 6h kill.
timeout = 300
