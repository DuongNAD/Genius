app:
  name: "Antigravity Core"
  version: "2.0"
models:
  openai: "gpt-4o"
  anthropic: "claude-sonnet-4-6"
  # grok is an OPT-IN backend only (no default chain uses it); enable it per
  # role with GENIUS_PROVIDER_<ROLE>=grok,...
  grok: "grok-build-0.1"
  # Antigravity 2.0 (agy CLI / Gemini), the default Researcher primary;
  # empty = the account's default model.
  agy: ""
scanner:
  chunk_size_limit: 8000
  exclude_patterns:
    - ".git/"
    - "node_modules/"
    - "venv/"
    - ".venv/"
    - ".pytest_cache/"

services:
  grok_researcher: "http://localhost:8001"
  claude_architect: "http://localhost:8002"
  codex_reviewer: "http://localhost:8003"
  tester_agent: "http://localhost:8004"
  security_agent: "http://localhost:8005"
  devops_agent: "http://localhost:8006"
